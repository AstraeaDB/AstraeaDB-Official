syntax = "proto3";

package astraea;

import "google/protobuf/wrappers.proto";

// ---------------------------------------------------------------------------
// AstraeaDB gRPC Service
// ---------------------------------------------------------------------------

service AstraeaService {
    // Node CRUD
    rpc CreateNode(CreateNodeRequest) returns (MutationResponse);
    rpc GetNode(GetNodeRequest) returns (GetNodeResponse);
    rpc UpdateNode(UpdateNodeRequest) returns (MutationResponse);
    rpc DeleteNode(DeleteNodeRequest) returns (MutationResponse);

    // Edge CRUD
    rpc CreateEdge(CreateEdgeRequest) returns (MutationResponse);
    rpc GetEdge(GetEdgeRequest) returns (GetEdgeResponse);
    rpc UpdateEdge(UpdateEdgeRequest) returns (MutationResponse);
    rpc DeleteEdge(DeleteEdgeRequest) returns (MutationResponse);

    // Graph traversal
    rpc Neighbors(NeighborsRequest) returns (NeighborsResponse);
    rpc Bfs(BfsRequest) returns (BfsResponse);
    rpc ShortestPath(ShortestPathRequest) returns (ShortestPathResponse);

    // Vector search
    rpc VectorSearch(VectorSearchRequest) returns (VectorSearchResponse);

    // GQL query
    rpc Query(QueryRequest) returns (QueryResponse);

    // Temporal traversals
    rpc NeighborsAt(NeighborsAtRequest) returns (NeighborsResponse);
    rpc BfsAt(BfsAtRequest) returns (BfsResponse);
    rpc ShortestPathAt(ShortestPathAtRequest) returns (ShortestPathResponse);

    // DFS traversal
    rpc Dfs(DfsRequest) returns (DfsResponse);
    rpc DfsAt(DfsAtRequest) returns (DfsResponse);

    // Label lookup
    rpc FindByLabel(FindByLabelRequest) returns (FindByLabelResponse);

    // Vector / semantic search
    rpc HybridSearch(HybridSearchRequest) returns (GenericJsonResponse);
    rpc SemanticNeighbors(SemanticNeighborsRequest) returns (GenericJsonResponse);
    rpc SemanticWalk(SemanticWalkRequest) returns (GenericJsonResponse);

    // Graph algorithms
    rpc RunPageRank(RunPageRankRequest) returns (GenericJsonResponse);
    rpc RunLouvain(RunLouvainRequest) returns (GenericJsonResponse);
    rpc RunConnectedComponents(RunConnectedComponentsRequest) returns (GenericJsonResponse);
    rpc RunDegreeCentrality(RunDegreeCentralityRequest) returns (GenericJsonResponse);
    rpc RunBetweennessCentrality(RunBetweennessCentralityRequest) returns (GenericJsonResponse);

    // Graph stats & subgraph
    rpc GraphStats(GraphStatsRequest) returns (GenericJsonResponse);
    rpc GetSubgraph(GetSubgraphRequest) returns (GenericJsonResponse);

    // RAG
    rpc ExtractSubgraph(ExtractSubgraphRequest) returns (GenericJsonResponse);
    rpc GraphRag(GraphRagRequest) returns (GenericJsonResponse);

    // Health check
    rpc Ping(PingRequest) returns (PingResponse);
}

// ---------------------------------------------------------------------------
// Node messages
// ---------------------------------------------------------------------------

message CreateNodeRequest {
    repeated string labels = 1;
    string properties_json = 2; // JSON-encoded properties
    repeated float embedding = 3; // optional; empty means no embedding
}

message GetNodeRequest {
    uint64 id = 1;
}

message GetNodeResponse {
    bool found = 1;
    uint64 id = 2;
    repeated string labels = 3;
    string properties_json = 4; // JSON-encoded properties
    bool has_embedding = 5;
    string error = 15;
}

message UpdateNodeRequest {
    uint64 id = 1;
    string properties_json = 2; // JSON-encoded properties
}

message DeleteNodeRequest {
    uint64 id = 1;
}

// ---------------------------------------------------------------------------
// Edge messages
// ---------------------------------------------------------------------------

message CreateEdgeRequest {
    uint64 source = 1;
    uint64 target = 2;
    string edge_type = 3;
    string properties_json = 4; // JSON-encoded properties
    double weight = 5;
    google.protobuf.Int64Value valid_from = 6; // nullable temporal start
    google.protobuf.Int64Value valid_to = 7;   // nullable temporal end
}

message GetEdgeRequest {
    uint64 id = 1;
}

message GetEdgeResponse {
    bool found = 1;
    uint64 id = 2;
    uint64 source = 3;
    uint64 target = 4;
    string edge_type = 5;
    string properties_json = 6; // JSON-encoded properties
    double weight = 7;
    google.protobuf.Int64Value valid_from = 8; // nullable temporal start
    google.protobuf.Int64Value valid_to = 9;   // nullable temporal end
    string error = 15;
}

message UpdateEdgeRequest {
    uint64 id = 1;
    string properties_json = 2; // JSON-encoded properties
}

message DeleteEdgeRequest {
    uint64 id = 1;
}

// ---------------------------------------------------------------------------
// Generic mutation response (for create / update / delete)
// ---------------------------------------------------------------------------

message MutationResponse {
    bool success = 1;
    string result_json = 2; // JSON-encoded result data (e.g. {"node_id": 1})
    string error = 3;
}

// ---------------------------------------------------------------------------
// Traversal messages
// ---------------------------------------------------------------------------

message NeighborsRequest {
    uint64 id = 1;
    string direction = 2; // "outgoing", "incoming", "both"
    string edge_type = 3; // empty string means no filter
}

message NeighborEntry {
    uint64 edge_id = 1;
    uint64 node_id = 2;
}

message NeighborsResponse {
    repeated NeighborEntry neighbors = 1;
    string error = 15;
}

message BfsRequest {
    uint64 start = 1;
    uint32 max_depth = 2;
}

message BfsEntry {
    uint64 node_id = 1;
    uint32 depth = 2;
}

message BfsResponse {
    repeated BfsEntry nodes = 1;
    string error = 15;
}

message ShortestPathRequest {
    uint64 from = 1;
    uint64 to = 2;
    bool weighted = 3;
}

message ShortestPathResponse {
    bool found = 1;
    repeated uint64 path = 2;
    uint32 length = 3;
    google.protobuf.DoubleValue cost = 4; // nullable; set only for weighted paths
    string error = 15;
}

// ---------------------------------------------------------------------------
// Vector search messages
// ---------------------------------------------------------------------------

message VectorSearchRequest {
    repeated float query = 1;
    uint32 k = 2;
}

message VectorSearchResult {
    uint64 node_id = 1;
    float score = 2;
}

message VectorSearchResponse {
    repeated VectorSearchResult results = 1;
    string error = 15;
}

// ---------------------------------------------------------------------------
// GQL query messages
// ---------------------------------------------------------------------------

message QueryRequest {
    string gql = 1;
}

message QueryResponse {
    bool success = 1;
    string result_json = 2; // JSON-encoded query result
    string error = 15;
}

// ---------------------------------------------------------------------------
// Health check messages
// ---------------------------------------------------------------------------

// ---------------------------------------------------------------------------
// Generic JSON response (used for algorithm / search results)
// ---------------------------------------------------------------------------

message GenericJsonResponse {
    bool success = 1;
    string result_json = 2; // JSON-encoded result data
    string error = 3;
}

// ---------------------------------------------------------------------------
// Temporal traversal messages
// ---------------------------------------------------------------------------

message NeighborsAtRequest {
    uint64 id = 1;
    string direction = 2;
    int64 timestamp = 3;
    string edge_type = 4; // empty string means no filter
}

message BfsAtRequest {
    uint64 start = 1;
    uint32 max_depth = 2;
    int64 timestamp = 3;
}

message ShortestPathAtRequest {
    uint64 from = 1;
    uint64 to = 2;
    int64 timestamp = 3;
    bool weighted = 4;
}

// ---------------------------------------------------------------------------
// DFS messages
// ---------------------------------------------------------------------------

message DfsRequest {
    uint64 start = 1;
    uint32 max_depth = 2;
}

message DfsAtRequest {
    uint64 start = 1;
    uint32 max_depth = 2;
    int64 timestamp = 3;
}

message DfsResponse {
    repeated uint64 nodes = 1;
    string error = 15;
}

// ---------------------------------------------------------------------------
// Label lookup messages
// ---------------------------------------------------------------------------

message FindByLabelRequest {
    string label = 1;
}

message FindByLabelResponse {
    repeated uint64 node_ids = 1;
    string error = 15;
}

// ---------------------------------------------------------------------------
// Hybrid / Semantic search messages
// ---------------------------------------------------------------------------

message HybridSearchRequest {
    uint64 anchor = 1;
    repeated float query = 2;
    uint32 max_hops = 3;
    uint32 k = 4;
    float alpha = 5;
}

message SemanticNeighborsRequest {
    uint64 id = 1;
    repeated float concept = 2;
    string direction = 3;
    uint32 k = 4;
}

message SemanticWalkRequest {
    uint64 start = 1;
    repeated float concept = 2;
    uint32 max_hops = 3;
}

// ---------------------------------------------------------------------------
// Graph algorithm messages
// ---------------------------------------------------------------------------

message RunPageRankRequest {
    repeated uint64 nodes = 1;  // empty means all nodes
    double damping = 2;
    uint32 max_iterations = 3;
    double tolerance = 4;
}

message RunLouvainRequest {
    repeated uint64 nodes = 1;  // empty means all nodes
}

message RunConnectedComponentsRequest {
    repeated uint64 nodes = 1;  // empty means all nodes
    bool strong = 2;
}

message RunDegreeCentralityRequest {
    repeated uint64 nodes = 1;  // empty means all nodes
    string direction = 2;
}

message RunBetweennessCentralityRequest {
    repeated uint64 nodes = 1;  // empty means all nodes
}

// ---------------------------------------------------------------------------
// Graph stats & subgraph messages
// ---------------------------------------------------------------------------

message GraphStatsRequest {}

message GetSubgraphRequest {
    uint64 center = 1;
    uint32 hops = 2;
    uint32 max_nodes = 3;
}

// ---------------------------------------------------------------------------
// RAG messages
// ---------------------------------------------------------------------------

message ExtractSubgraphRequest {
    uint64 center = 1;
    uint32 hops = 2;
    uint32 max_nodes = 3;
    string format = 4;  // "prose", "structured", "triples", "json"
}

message GraphRagRequest {
    string question = 1;
    repeated float question_embedding = 2;  // optional; empty means not provided
    uint64 anchor = 3;                      // 0 means not provided
    uint32 hops = 4;
    uint32 max_nodes = 5;
    string format = 6;
}

// ---------------------------------------------------------------------------
// Health check messages
// ---------------------------------------------------------------------------

message PingRequest {}

message PingResponse {
    bool pong = 1;
    string version = 2;
}
